name: spend_sense_

description: A GenZ Expense Tracker App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  excel: ^4.0.6 
  path_provider: ^2.1.2
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  intl: ^0.19.0
  provider: ^6.1.1
  hive_flutter: ^1.1.0
  nanoid: ^1.0.0
  hive: ^2.2.3
  http: ^1.2.0
  math_expressions: ^2.5.0
  share_plus : ^9.0.0
  pdf: ^3.11.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  file_picker: ^8.0.0
  fl_chart: ^0.70.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  flutter_launcher_icons: ^0.13.1
  firebase_database: ^11.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  adaptive_icon_background: "#D1F2D1"
  
flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png